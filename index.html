function nextInventoryCode(productType='PL'){ const base=`STK${productType||'PL'}`, date=quoteDateCode(); let max=0; state.inventory.items.forEach(item=>{ const m=String(item.code||'').match(new RegExp(`^${base}(\\d{2})-${date}$`)); if(m)max=Math.max(max,Number(m[1]||0)); }); return `${base}${String(Math.min(max+1,99)).padStart(2,'0')}-${date}`; }
function ensureInventoryDraftCode(force=false){ const d=state.inventory.draft=state.inventory.draft||inventoryDraftDefaults(); if(!d.name)d.name=productTypeName(d.productType); if(force||!String(d.code||'').trim()||isInventoryCode(d.code))d.code=nextInventoryCode(d.productType); return d.code; }

function normalizeInventoryItem(item){ const code=item.code||item.barcodeId||item.qrCode||randomInventoryBarcode(), attrs={...ATTRIBUTE_DEFAULTS,...(item.attributes||{})}, itemKind=item.itemKind||attrs._itemKind||'sale'; return {...item, code, barcodeId:code, itemKind, purchasePrice:parseInputMoney(item.purchasePrice??attrs._purchasePrice??0), orderDate:item.orderDate||attrs._orderDate||'', importDate:item.importDate||attrs._importDate||'', exportDate:item.exportDate||attrs._exportDate||'', saleInvoiceName:item.saleInvoiceName||attrs._saleInvoiceName||'', saleInvoiceDataUrl:item.saleInvoiceDataUrl||attrs._saleInvoiceDataUrl||'', attributes:attrs}; }

function driveDirectUrl(id){ return id?`https://drive.google.com/uc?export=view&id=${encodeURIComponent(id)}`:''; }
function driveFileUrl(id){ return id?`https://drive.google.com/file/d/${encodeURIComponent(id)}/view`:''; }
function driveAssetUrl(value){ const v=String(value||'').trim(); if(!v)return''; if(v.startsWith('data:'))return v; const id=v.match(/drive\.google\.com\/file\/d\/([^/]+)/)?.[1]||v.match(/[?&]id=([^&]+)/)?.[1]; return id?driveDirectUrl(id):v; }
function driveViewUrl(value){ const v=String(value||'').trim(); if(!v||v.startsWith('data:'))return v; const id=v.match(/drive\.google\.com\/file\/d\/([^/]+)/)?.[1]||v.match(/[?&]id=([^&]+)/)?.[1]; return id?driveFileUrl(id):v; }

async function uploadFileToDrive(file,kind,code=''){
  const endpoint=driveUploadEndpoint();
  if(!endpoint)throw new Error('Chưa cấu hình Google Drive upload.');
  const dataUrl=await readFileDataUrl(file);
  const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({kind,code,fileName:file.name||`${kind}-${Date.now()}`,mimeType:file.type||'application/octet-stream',dataUrl})});
  const text=await res.text();
  let data;
  try{ data=JSON.parse(text); }catch{ throw new Error(text||'Google Drive upload chưa trả JSON hợp lệ.'); }
  if(!res.ok||!data.ok)throw new Error(data.error||`Google Drive upload lỗi ${res.status}`);
  return data;
}
async function storeInventoryFile(file,kind,code=''){
  if(driveUploadEndpoint())return uploadFileToDrive(file,kind,code);
  state.inventory.syncStatus='Chưa kết nối Drive Web App, file đang lưu tạm trong app.';
  const dataUrl=await readFileDataUrl(file);
  return {ok:true,name:file.name,mimeType:file.type||'application/octet-stream',viewUrl:dataUrl,downloadUrl:dataUrl,imageUrl:dataUrl};
}

async function upsertInventoryItem(){ const d=state.inventory.draft||inventoryDraftDefaults(); if(!String(d.code||'').trim()||isInventoryCode(d.code)) d.code=nextInventoryCode(d.productType); const code=String(d.code||'').trim(); if(!code)return alert('Anh nhập mã hàng trước nhé.'); const qty=Number(d.quantity||0); if(qty<=0)return alert('Số lượng nhập kho phải lớn hơn 0.'); const existing=state.inventory.items.find(x=>x.code===code); const item=normalizeInventoryItem({...d,code,barcodeId:code,itemKind:d.itemKind||'sale',invoiceName:d.itemKind==='sample'?'':d.invoiceName,invoiceDataUrl:d.itemKind==='sample'?'':d.invoiceDataUrl,name:String(d.name||productTypeName(d.productType)||'Sản phẩm').trim(),quantity:qty,purchasePrice:parseInputMoney(d.purchasePrice),price:parseInputMoney(d.price),orderDate:d.orderDate||'',importDate:d.importDate||todayIso(),exportDate:d.exportDate||'',saleInvoiceName:d.itemKind==='sample'?'':(d.saleInvoiceName||''),saleInvoiceDataUrl:d.itemKind==='sample'?'':(d.saleInvoiceDataUrl||''),attributes:{...ATTRIBUTE_DEFAULTS,...(d.attributes||{})}}); let movement; if(existing){ const newQty=Number(existing.quantity||0)+qty; Object.assign(existing,item,{id:existing.id,quantity:newQty}); movement=inventoryMovement('Nhập kho',existing,qty); await saveInventoryItemRemote(existing).catch(e=>{state.inventory.syncStatus='Chưa ghi được Supabase, đã lưu tạm trên máy.'; console.warn(e);}); } else { item.id=uid(); state.inventory.items.unshift(item); movement=inventoryMovement('Nhập kho',item,qty); await saveInventoryItemRemote(item).catch(e=>{state.inventory.syncStatus='Chưa ghi được Supabase, đã lưu tạm trên máy.'; console.warn(e);}); } if(movement) await insertInventoryMovementRemote(movement).catch(e=>console.warn(e)); state.inventory.draft={...inventoryDraftDefaults(),productType:d.productType,itemKind:d.itemKind||'sale',unit:d.unit,attributes:{...ATTRIBUTE_DEFAULTS,...(d.attributes||{})}}; ensureInventoryDraftCode(true); saveInventory(); render(); }
async function adjustInventory(code,type,qty){ const item=findInventoryItem(code); if(!item)return; qty=Number(qty||0); if(qty<=0)return alert('Anh nhập số lượng hợp lệ.'); if(type==='Xuất kho' && qty>Number(item.quantity||0))return alert('Số lượng xuất lớn hơn tồn kho.'); item.quantity=Number(item.quantity||0)+(type==='Nhập kho'?qty:-qty); if(type==='Xuất kho')item.exportDate=todayIso(); if(type==='Nhập kho'&&!item.importDate)item.importDate=todayIso(); const movement=inventoryMovement(type,item,qty); saveInventory(); render(); await saveInventoryItemRemote(item).catch(e=>{state.inventory.syncStatus='Chưa ghi được Supabase, đã lưu tạm trên máy.'; console.warn(e); render();}); await insertInventoryMovementRemote(movement).catch(e=>console.warn(e)); }

async function supabaseRequest(path,options={}){ const res=await fetch(`${SUPABASE_URL}${path}`,{...options,headers:supabaseHeaders(options.headers||{})}); const text=await res.text().catch(()=>''); if(!res.ok)throw new Error(text||`Supabase lỗi ${res.status}`); return text?JSON.parse(text):null; }
function itemToSupabaseRow(item){ return {code:item.code,barcode_id:item.barcodeId,name:item.name,product_type:item.productType,unit:item.unit,quantity:Number(item.quantity||0),price:parseInputMoney(item.price),dimension:item.dimension||'',photo_data_url:driveStoredValue(item.photoDataUrl),invoice_name:item.itemKind==='sample'?'':(item.invoiceName||''),invoice_data_url:item.itemKind==='sample'?'':driveStoredValue(item.invoiceDataUrl),attributes:{...ATTRIBUTE_DEFAULTS,...(item.attributes||{}),_itemKind:item.itemKind||'sale',_purchasePrice:parseInputMoney(item.purchasePrice),_orderDate:item.orderDate||'',_importDate:item.importDate||'',_exportDate:item.exportDate||'',_saleInvoiceName:item.saleInvoiceName||'',_saleInvoiceDataUrl:driveStoredValue(item.saleInvoiceDataUrl)},updated_at:new Date().toISOString()}; }
function supabaseRowToItem(row){ const attrs={...ATTRIBUTE_DEFAULTS,...(row.attributes||{})}, itemKind=attrs._itemKind||'sale'; return normalizeInventoryItem({id:row.id||row.barcode_id,code:row.code||'',barcodeId:row.barcode_id||'',name:row.name||'',productType:row.product_type||'PL',itemKind,unit:row.unit||'Cái (pcs)',quantity:Number(row.quantity||0),price:Number(row.price||0),dimension:row.dimension||'',photoDataUrl:row.photo_data_url||'',invoiceName:itemKind==='sample'?'':(row.invoice_name||''),invoiceDataUrl:itemKind==='sample'?'':(row.invoice_data_url||''),attributes:attrs}); }

async function syncInventoryFromSupabase(){ if(!SUPABASE_URL||!SUPABASE_ANON_KEY)return; state.inventory.syncStatus='Đang tải kho từ Supabase...'; render(); try{ const [items,moves]=await Promise.all([supabaseRequest('/rest/v1/inventory_items?select=*&order=updated_at.desc'),supabaseRequest('/rest/v1/inventory_movements?select=*&order=happened_at.desc&limit=200')]); state.inventory.items=(items||[]).map(supabaseRowToItem); state.inventory.movements=(moves||[]).map(supabaseMovementToLocal); state.inventory.syncStatus='Đã đồng bộ Supabase.'; saveInventory(); render(); }catch(e){ state.inventory.syncStatus='Chưa kết nối được Supabase. Nếu mới tạo project, cần tạo bảng inventory_items và inventory_movements trước.'; console.warn('Supabase inventory sync failed:', e); render(); } }

async function deleteInventoryMovementRemote(m){ const id=String(m.id||''); if(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(id)){ await supabaseRequest(`/rest/v1/inventory_movements?id=eq.${encodeURIComponent(id)}`,{method:'DELETE'}); return; } await supabaseRequest(`/rest/v1/inventory_movements?code=eq.${encodeURIComponent(m.code||'')}&type=eq.${encodeURIComponent(m.type||'')}&happened_at=eq.${encodeURIComponent(m.time||'')}`,{method:'DELETE'}); }
function supabaseSchemaSql(){ return `create table if not exists inventory_items (
  id uuid primary key default gen_random_uuid(),
  code text not null,
  barcode_id text not null unique,
  name text,
  product_type text,
  unit text,
  quantity numeric default 0,
  price numeric default 0,
  dimension text,
  photo_data_url text,
  invoice_name text,
  invoice_data_url text,
  attributes jsonb default '{}'::jsonb,
  updated_at timestamptz default now()
);
create table if not exists inventory_movements (
  id uuid primary key default gen_random_uuid(),
  type text not null,
  code text,
  barcode_id text,
  name text,
  qty numeric default 0,
  happened_at timestamptz default now(),
  created_at timestamptz default now()
);
alter table inventory_items enable row level security;
alter table inventory_movements enable row level security;
drop policy if exists "public read inventory" on inventory_items;
drop policy if exists "public write inventory" on inventory_items;
drop policy if exists "public read movements" on inventory_movements;
drop policy if exists "public write movements" on inventory_movements;
create policy "public read inventory" on inventory_items for select using (true);
create policy "public write inventory" on inventory_items for all using (true) with check (true);
create policy "public read movements" on inventory_movements for select using (true);
create policy "public write movements" on inventory_movements for all using (true) with check (true);`; }
function showSupabaseSchemaSql(){ prompt('Copy đoạn SQL này vào Supabase > SQL Editor > Run:', supabaseSchemaSql()); }


function productAttributes(product){ return {...ATTRIBUTE_DEFAULTS}; }
function clearAutoAttributes(attrs){
  const current={...ATTRIBUTE_DEFAULTS,...(attrs||{})};
  const autoSets=SAMPLE_PRODUCTS.map(p=>p.attributes||{});
  const isAuto=autoSets.some(set=>ATTRIBUTE_FIELDS.every(f=>String(current[f.key]||'')===String(set[f.key]||'')));
  return isAuto?{...ATTRIBUTE_DEFAULTS}:current;
}
function clearAutoCodeParts(line){
  const sampleNames=SAMPLE_PRODUCTS.map(p=>p.name);
  const sampleDimensions=SAMPLE_PRODUCTS.map(p=>p.dimension);
  const looksAuto=!line.codePartsTouched && sampleNames.includes(line.name) && (line.stockMode==='OD'||line.stockMode==='') && (line.productType==='PL'||line.productType==='WL'||line.productType==='') && (line.leadTime==='30-35 ngày'||line.leadTime==='35-45 ngày'||line.leadTime==='');
  if(looksAuto){
    line.productType='';
    line.stockMode='';
    line.leadTime='';
    if(sampleDimensions.includes(line.dimension)) line.dimension='';
  }
  return line;
}
function normalizeQuoteLine(line){
  const l=clearAutoCodeParts(syncLineDefaults(line));
  l.attributes=l.attrsTouched?{...ATTRIBUTE_DEFAULTS,...(l.attributes||{})}:clearAutoAttributes(l.attributes);
  return l;
}


function cleanSearch(v){ return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function inferProductType(line){ const s=cleanSearch(`${line?.name||''} ${line?.productId||''} ${line?.code||''}`); if(s.includes('tuong')||s.includes('wall'))return'WL'; if(s.includes('tha')||s.includes('pendant'))return'PL'; if(s.includes('ban')||s.includes('table'))return'TL'; if(s.includes('san')||s.includes('floor'))return'FL'; if(s.includes('chum')||s.includes('chandelier'))return'CD'; return line?.productType||'PL'; }
function inferStockMode(line){ const s=cleanSearch(`${line?.status||''} ${line?.code||''}`); if(s.includes('co san')||s.includes('stock')||s.includes('stk'))return'STK'; return line?.stockMode||'OD'; }
function productTypeName(value){ return PRODUCT_TYPES.find(t=>t.value===value)?.name || ''; }
function statusForLine(line){ if(!line.stockMode)return ''; if(line.stockMode==='STK')return 'Có sẵn'; return line.leadTime?`Đặt hàng từ ${line.leadTime}`:'Đặt hàng'; }
function syncLineDefaults(line, forceName=false){ line.productType=line.productType||''; line.stockMode=line.stockMode||''; line.leadTime=line.leadTime||''; if(line.chinaPrice==null)line.chinaPrice=''; if(line.weight==null)line.weight=''; if(line.profitPercent==null||line.profitPercent==='')line.profitPercent=120; if((forceName || !line.nameCustom) && line.productType) line.name=productTypeName(line.productType); line.status=statusForLine(line); return line; }
function quoteDateCode(d=new Date()){ return String(d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
function codeBase(line){ const mode=line.stockMode||'', type=line.productType||''; return mode&&type?`${mode}${type}`:''; }
function refreshLineCodes(){ const date=quoteDateCode(), counters={}; state.lines.forEach(line=>{ syncLineDefaults(line); const base=codeBase(line); if(!base){line.code=''; return;} counters[base]=(counters[base]||0)+1; line.code=`${base}${String(Math.min(counters[base],99)).padStart(2,'0')}-${date}`; }); }
function applyProduct(product, quantity=1){ const line={ uid:uid(), productId:product?.id||'', status:'', code:'', name:product?.name||'', nameCustom:false, leadTime:'', photo:product?.photo||'', photoDataUrl:product?.photoDataUrl||'', dimension:'', description:product?.description||'', attributes:productAttributes(product), unit:product?.unit||'Cái (pcs)', quantity, price:product?.price||0, chinaPrice:product?.chinaPrice||'', weight:product?.weight||'', profitPercent:product?.profitPercent||120, codePartsTouched:false }; line.productType=''; line.stockMode=''; return syncLineDefaults(line); }

function numberToVietnamese(input){ const n=Math.round(Number(input||0)); if(!n) return 'Không đồng'; const d=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'], u=['',' nghìn',' triệu',' tỷ']; function r3(v,full){ const h=Math.floor(v/100), t=Math.floor((v%100)/10), o=v%10, p=[]; if(h||full)p.push(d[h]+' trăm'); if(t>1){p.push(d[t]+' mươi'); if(o===1)p.push('mốt'); else if(o===5)p.push('lăm'); else if(o)p.push(d[o]);} else if(t===1){p.push('mười'); if(o===5)p.push('lăm'); else if(o)p.push(d[o]);} else if(o){ if(h||full)p.push('lẻ'); p.push(d[o]);} return p.join(' ');} const g=[]; let rest=n; while(rest>0){g.push(rest%1000); rest=Math.floor(rest/1000);} const words=[]; for(let i=g.length-1;i>=0;i--) if(g[i]) words.push(r3(g[i], i<g.length-1)+u[i]); return words.join(' ').replace(/\s+/g,' ').trim().replace(/^./,c=>c.toUpperCase())+' đồng'; }
function numberToEnglish(input){
  const n=Math.round(Number(input||0));
  if(!n) return 'Zero';
  const ones=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tens=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  const units=['','thousand','million','billion'];
  function r3(v){
    const h=Math.floor(v/100), rest=v%100, parts=[];
    if(h) parts.push(ones[h]+' hundred');
    if(rest>=20){parts.push(tens[Math.floor(rest/10)]+(rest%10?'-'+ones[rest%10]:''));}
    else if(rest) parts.push(ones[rest]);
    return parts.join(' ');
  }
  const groups=[]; let rest=n;
  while(rest>0){groups.push(rest%1000); rest=Math.floor(rest/1000);}
  const words=[];
  for(let i=groups.length-1;i>=0;i--) if(groups[i]) words.push(r3(groups[i])+(units[i]?' '+units[i]:''));
  return words.join(' ').replace(/^./,c=>c.toUpperCase());
}

function dataUrlToBlob(dataUrl){
  const [head,body]=String(dataUrl||'').split(',');
  const mime=(head.match(/data:([^;]+)/)||[])[1]||'application/octet-stream';
  const bin=atob(body||''), bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new Blob([bytes],{type:mime});
}
function viewInventoryFile(code,field,label='hóa đơn'){
  const item=findInventoryItem(code);
  const value=item?.[field];
  if(!value)return alert(`Sản phẩm này chưa có ${label}.`);
  if(!String(value).startsWith('data:')){
    const win=window.open(driveViewUrl(value),'_blank');
    if(!win)alert(`Trình duyệt đang chặn mở ${label}. Anh cho phép popup rồi bấm lại.`);
    return;
  }
  try{
    const url=URL.createObjectURL(dataUrlToBlob(value));
    const win=window.open(url,'_blank');
    if(!win)alert(`Trình duyệt đang chặn mở ${label}. Anh cho phép popup rồi bấm lại.`);
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){
    alert(`Chưa mở được ${label}.`);
  }
}
function viewInventoryInvoice(code){ viewInventoryFile(code,'invoiceDataUrl','hóa đơn vào'); }
function viewInventorySaleInvoice(code){ viewInventoryFile(code,'saleInvoiceDataUrl','hóa đơn đầu ra'); }
async function uploadInventoryItemFile(code,field,nameField,kind,file){
  const item=findInventoryItem(code);
  if(!item||!file)return;
  state.inventory.syncStatus=driveUploadEndpoint()?`Đang upload ${file.name} lên Google Drive...`:`Đang lưu tạm ${file.name} trong app...`;
  render();
  try{
    const uploaded=await storeInventoryFile(file,kind,item.code||code);
    item[nameField]=file.name;
    item[field]=uploaded?.viewUrl||uploaded?.downloadUrl||uploaded?.url||driveFileUrl(uploaded?.fileId);
    if(uploaded?.fileId)item.attributes={...(item.attributes||{}),[`_${field}DriveId`]:uploaded.fileId};
    state.inventory.syncStatus=driveUploadEndpoint()?'Đã upload file lên Google Drive.':'Đã lưu tạm file trong app.';
    saveInventory();
    await saveInventoryItemRemote(item).catch(e=>{state.inventory.syncStatus='Chưa ghi được Supabase, đã lưu tạm trên máy.'; console.warn(e);});
  }catch(e){
    state.inventory.syncStatus='Chưa lưu được file.';
    console.warn(e);
  }
  render();
}

ate{position:absolute;right:73px;bottom:42px;font-size:10px}</style>${pages.map(pageHtml).join('')}`;
