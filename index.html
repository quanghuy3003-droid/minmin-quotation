function validateInputInvoice(inv){
  const notes=[];
  inv.extraction_method=inv.extraction_method||'MANUAL';
  inv.confidence_score=Number(inv.confidence_score||0);
  inv.items=(Array.isArray(inv.items)?inv.items:[]).map((it,i)=>inputInvoiceFinalizeLineAmount({...it,line_index:i+1},inv.vat_rate));
  if(inv.parser_error_message)notes.push(inv.parser_error_message);
  if(inv.extraction_method!=='XML')notes.push('Chưa có XML làm nguồn dữ liệu');
  if(!inv.invoice_date)notes.push('Thiếu ngày hóa đơn');
  if(!inv.invoice_number)notes.push('Thiếu số hóa đơn');
  if(!inv.invoice_series)notes.push('Thiếu ký hiệu hóa đơn');
  if(!inv.seller_tax_code)notes.push('Thiếu MST người bán');
  if(!inv.buyer_tax_code)notes.push('Thiếu MST người mua');
  if(state.inputInvoices.companyTaxCode&&inv.buyer_tax_code&&invoiceNorm(inv.buyer_tax_code)!==invoiceNorm(state.inputInvoices.companyTaxCode))notes.push('MST người mua khác MST công ty');

  if(invoiceDuplicate(inv))notes.push('Trùng hóa đơn');
  const detailItems=(inv.items||[]).filter(x=>x.item_name||x.net_amount||x.total_amount);
  if(inv.extraction_method==='XML'&&!detailItems.length)notes.push('XML chưa tách được từng dòng hàng hóa/dịch vụ');
  if(detailItems.length){
    const lineTotals=inputInvoiceItemsTotals(detailItems);
    if(Number(inv.total_amount||0)&&Math.abs(lineTotals.total-Number(inv.total_amount||0))>1000)notes.push('Tổng chi tiết từng món chưa khớp tổng hóa đơn');
  }
  if(!inv.vat_rate&&Number(inv.vat_amount||0)>0&&Number(inv.net_amount||0)>0){ const guessed=Math.round(Number(inv.vat_amount||0)/Number(inv.net_amount||1)*100); if(guessed>0&&guessed<30)inv.vat_rate=`${guessed}%`; }

  inv.needs_manual_review=notes.length>0;
  inv.validation_notes=notes.join('; ');
  inv.validation_status=notes.some(n=>n.includes('Trùng'))?'Lỗi trùng hóa đơn':(notes.length?'Cần kiểm tra':'Hợp lệ');
  return inv;
}

          rows=candidates.filter(el=>!Array.from(el.children||[]).some(child=>candidates.includes(child)));
        }
        items=rows.map((el,i)=>invoiceXmlParseLineElement(el,i,defaultVatRate)).filter(x=>x.item_name||x.net_amount||x.total_amount);
      }
    }
  }catch(e){ console.warn('Không tách được chi tiết XML bằng DOMParser:',e); }
  if(!items.length){
    const blocks=[...raw.matchAll(/<[^:>]*:?HHDVu\b[^>]*>([\s\S]*?)<\/[^:>]*:?HHDVu>/gi)].map(m=>m[1]);
    items=blocks.map((b,i)=>invoiceXmlParseLineBlock(b,i,defaultVatRate)).filter(x=>x.item_name||x.net_amount||x.total_amount);

  return items.map((it,i)=>({...inputInvoiceFinalizeLineAmount(it,defaultVatRate),line_index:i+1}));

function inputInvoiceItemsTotals(items){ return (items||[]).map(inputInvoiceFinalizeLineAmount).reduce((a,it)=>({net:a.net+Number(it.net_amount||0),vat:a.vat+Number(it.vat_amount||0),total:a.total+Number(it.total_amount||0)}),{net:0,vat:0,total:0}); }
function inputInvoiceExt(file){ return String(file?.name||'').toLowerCase().split('.').pop()||''; }

function parseVietnamInvoiceXml(xml,fileMeta={}){
  if(!String(xml||'').includes('<'))throw new Error('File XML không đọc được hoặc không đúng định dạng hóa đơn');
  const inv=invoiceEmpty({period:state.inputInvoices.period,note:state.inputInvoices.note,source_file_name:fileMeta.name||'',source_file_url:fileMeta.url||'',source_xml_url:fileMeta.xmlUrl||fileMeta.url||'',source_pdf_url:fileMeta.pdfUrl||'',confidence_score:0.98,extraction_method:'XML'});
  inv.invoice_date=invoiceTagText(xml,['NLap','NgayLap','invoiceIssuedDate']).slice(0,10);
  inv.invoice_number=invoiceTagText(xml,['SHDon','SoHoaDon','invoiceNumber']);
  inv.invoice_series=invoiceTagText(xml,['KHHDon','KyHieu','invoiceSeries']);
  inv.invoice_template=invoiceTagText(xml,['KHMSHDon','MauSo','invoiceTemplate']);
  inv.tax_authority_code=invoiceTagText(xml,['MCCQT','MaCQT','taxAuthorityCode']);
  inv.seller_name=invoiceParentChild(xml,['NBan','Seller','SellerInfo'],['Ten','Name','sellerName'])||invoiceTagText(xml,['sellerName']);
  inv.seller_tax_code=invoiceParentChild(xml,['NBan','Seller','SellerInfo'],['MST','TaxCode','sellerTaxCode'])||invoiceTagText(xml,['sellerTaxCode']);
  inv.seller_address=invoiceParentChild(xml,['NBan','Seller','SellerInfo'],['DChi','Address','sellerAddress']);
  inv.buyer_name=invoiceParentChild(xml,['NMua','Buyer','BuyerInfo'],['Ten','Name','buyerName'])||invoiceTagText(xml,['buyerName']);
  inv.buyer_tax_code=invoiceParentChild(xml,['NMua','Buyer','BuyerInfo'],['MST','TaxCode','buyerTaxCode'])||invoiceTagText(xml,['buyerTaxCode']);
  inv.buyer_address=invoiceParentChild(xml,['NMua','Buyer','BuyerInfo'],['DChi','Address','buyerAddress']);
  inv.net_amount=invoiceMoney(invoiceTagText(xml,['TgTCThue','TongTienChuaThue','netAmount']));
  inv.vat_amount=invoiceMoney(invoiceTagText(xml,['TgTThue','TongTienThue','vatAmount']));
  inv.total_amount=invoiceMoney(invoiceTagText(xml,['TgTTTBSo','TgTTTBangSo','TongTienThanhToan','totalAmount']));
  inv.vat_rate=invoiceTagText(xml,['TSuat','ThueSuat','vatRate']);
  inv.items=invoiceXmlLineItems(xml,inv.vat_rate);
  if(inv.items.length){
    const lineTotals=inputInvoiceItemsTotals(inv.items);
    if(!inv.net_amount)inv.net_amount=lineTotals.net;
    if(!inv.vat_amount)inv.vat_amount=lineTotals.vat;
    if(!inv.total_amount)inv.total_amount=lineTotals.total;
    inv.raw_item_description=inv.items.map((x,i)=>`${i+1}. ${x.item_name||''} | SL ${x.quantity||''} | Trước VAT ${moneyPlain(x.net_amount||0)} | VAT ${moneyPlain(x.vat_amount||0)} | Sau VAT ${moneyPlain(x.total_amount||0)}`).filter(Boolean).join('\n');
  }else{
    inv.raw_item_description=invoiceTagText(xml,['THHDVu','TenHang','NoiDung','Description']);
  }
  if(!inv.invoice_number&&!inv.seller_tax_code&&!inv.total_amount)throw new Error('File XML không đọc được hoặc không đúng định dạng hóa đơn');
  applyAccountingRule(inv);
  return validateInputInvoice(inv);
}

function parseInvoiceText(text,fileMeta={},method='PDF_TEXT',confidence=0.72){ const raw=String(text||'').replace(/\u00a0/g,' '), lines=raw.split(/\r?\n/).map(x=>x.trim()).filter(Boolean), joined=lines.join('\n'); const pick=(patterns)=>{ for(const p of patterns){ const m=joined.match(p); if(m?.[1])return m[1].trim().replace(/\s{2,}/g,' '); } return ''; }, dateRaw=pick([/(?:ngày|ngay|date)\s*(?:hóa đơn|hoa don|lập|lap)?\s*[:\-]?\s*(\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4})/i,/(\d{4}[\/\-.]\d{1,2}[\/\-.]\d{1,2})/]), toIso=d=>{ const s=String(d||'').trim(); const a=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/); if(a)return `${a[3].length===2?'20'+a[3]:a[3]}-${a[2].padStart(2,'0')}-${a[1].padStart(2,'0')}`; const b=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/); return b?`${b[1]}-${b[2].padStart(2,'0')}-${b[3].padStart(2,'0')}`:''; }, moneyNear=patterns=>invoiceMoney(pick(patterns)); const taxCodes=[...joined.matchAll(/\b\d{10}(?:-\d{3})?\b/g)].map(m=>m[0]), totals=[...joined.matchAll(/(?:\d{1,3}(?:[.,]\d{3})+|\d{6,})(?:\s*đ)?/g)].map(m=>invoiceMoney(m[0])).filter(n=>n>0).sort((a,b)=>b-a); const inv=invoiceEmpty({period:state.inputInvoices.period,note:state.inputInvoices.note,source_file_name:fileMeta.name||'',source_file_url:fileMeta.url||'',raw_ocr_text:method==='OCR'?joined:'',extraction_method:method,ocr_confidence_score:method==='OCR'?confidence:0,confidence_score:confidence}); inv.invoice_date=toIso(dateRaw); inv.invoice_number=pick([/(?:số|so|invoice\s*no|number)\s*(?:hóa đơn|hoa don|hđ|hd)?\s*[:\-]?\s*([A-Z0-9\-_.]{3,})/i,/(?:SHDon|Số HĐ)\s*[:\-]?\s*([A-Z0-9\-_.]{3,})/i]); inv.invoice_series=pick([/(?:ký hiệu|ky hieu|series)\s*[:\-]?\s*([A-Z0-9\-_.]{2,})/i]); inv.seller_tax_code=taxCodes[0]||''; inv.buyer_tax_code=taxCodes[1]||''; inv.seller_name=pick([/(?:đơn vị bán hàng|nguoi ban|người bán|seller)\s*[:\-]\s*(.+)/i,/(?:tên đơn vị|ten don vi)\s*[:\-]\s*(.+)/i]); inv.buyer_name=pick([/(?:đơn vị mua hàng|nguoi mua|người mua|buyer)\s*[:\-]\s*(.+)/i]); inv.net_amount=moneyNear([/(?:cộng tiền hàng|tong tien hang|tổng tiền hàng|tiền chưa thuế|chưa thuế)[^\d\r\n]*(\d[\d.,]*)/i]); inv.vat_amount=moneyNear([/(?:tiền thuế|tien thue|VAT)[^\d\r\n]*(\d[\d.,]*)/i]); inv.total_amount=moneyNear([/(?:tổng cộng tiền thanh toán|tong cong tien thanh toan|tổng thanh toán|thanh toán)[^\d\r\n]*(\d[\d.,]*)/i])||totals[0]||0; if(!inv.net_amount&&inv.total_amount&&inv.vat_amount)inv.net_amount=inv.total_amount-inv.vat_amount; inv.vat_rate=pick([/(?:thuế suất|thue suat|VAT)\s*[:\-]?\s*(\d{1,2}\s*%)/i]); inv.raw_item_description=pick([/(?:tên hàng hóa dịch vụ|ten hang hoa dich vu|nội dung|noi dung)\s*[:\-]\s*(.+)/i])||lines.slice(0,8).join('; '); if(method==='OCR'&&(!joined||joined.length<30)){ inv.confidence_score=0.2; inv.ocr_confidence_score=0.2; } applyAccountingRule(inv); return validateInputInvoice(inv); }

async function pdfTextFromFile(file){ const pdfjs=await ensurePdfJs(), pdf=await pdfjs.getDocument({data:await file.arrayBuffer()}).promise; let out=''; for(let i=1;i<=pdf.numPages;i++){ const page=await pdf.getPage(i), content=await page.getTextContent(); out+=content.items.map(x=>x.str||'').join(' ')+'\n'; } return out.trim(); }

async function processInputInvoiceFiles(){
  const baseName=f=>String(f.name||'').replace(/\.[^.]+$/,'').toLowerCase();
  const selected=pendingInputInvoiceFiles.slice();
  if(!selected.length)return alert('Anh chọn file XML hóa đơn trước nhé.');
  const xmlFiles=selected.filter(isInputInvoiceXml);
  const pdfFiles=selected.filter(f=>/pdf/i.test(f.type)||/\.pdf$/i.test(f.name));
  if(!xmlFiles.length)throw new Error('App chỉ đọc dữ liệu từ XML. PDF chỉ lưu để xem lại, anh upload thêm file XML hóa đơn.');
  state.inputInvoices.view='list';
  state.inputInvoices.syncStatus='Đang upload XML/PDF lên Supabase Storage và đọc dữ liệu XML...';
  render();
  const uploaded=new Map();
  for(const file of selected.filter(f=>isInputInvoiceXml(f)||/pdf/i.test(f.type)||/\.pdf$/i.test(f.name))){
    const urlObj=await storeInventoryFile(file,'input-invoice',file.name);
    const fileUrl=urlObj?.publicUrl||urlObj?.viewUrl||urlObj?.downloadUrl||urlObj?.url||'';
    uploaded.set(file,fileUrl);
    const fileRow={id:uid(),invoice_id:'',file_name:file.name,file_type:file.type||inputInvoiceExt(file),file_url:fileUrl,storage_path:urlObj?.storagePath||urlObj?.path||'',storage_bucket:urlObj?.bucket||'invoice',size:file.size||0,uploaded_at:new Date().toISOString()};
    state.inputInvoices.files.unshift(fileRow);
    await saveInputInvoiceFileRemote(fileRow).catch(e=>console.warn(e));
  }
  for(const xml of xmlFiles){
    const xmlUrl=uploaded.get(xml)||'', pdf=pdfFiles.find(f=>baseName(f)===baseName(xml)), pdfUrl=pdf?(uploaded.get(pdf)||''):'';
    try{
      const inv=await extractInputInvoiceFromXmlFile(xml,xmlUrl,pdfUrl);
      state.inputInvoices.invoices.unshift(inv);
      const linked=state.inputInvoices.files.filter(f=>[xml.name,pdf?.name].filter(Boolean).includes(f.file_name));
      linked.forEach(f=>f.invoice_id=inv.id);
      await saveInputInvoiceRemote(inv).catch(e=>console.warn(e));
      await saveInputInvoiceItemsRemote(inv).catch(e=>console.warn(e));
      await Promise.all(linked.map(f=>saveInputInvoiceFileRemote(f).catch(e=>console.warn(e))));
    }catch(e){
      const message=String(e?.message||e||'File XML không đọc được hoặc không đúng định dạng hóa đơn');
      const inv=validateInputInvoice(invoiceEmpty({period:state.inputInvoices.period,note:state.inputInvoices.note,source_file_name:xml.name,source_file_url:xmlUrl,source_xml_url:xmlUrl,source_pdf_url:pdfUrl,raw_item_description:'Không đọc được XML hóa đơn',confidence_score:0.2,extraction_method:'XML',parser_error_message:message,needs_manual_review:true}));
      state.inputInvoices.invoices.unshift(inv);
      await saveInputInvoiceRemote(inv).catch(err=>console.warn(err));
    }
  }
  pendingInputInvoiceFiles=[];
  state.inputInvoices.syncStatus='Đã đọc XML và lưu file lên Supabase Storage.';
  saveInputInvoices();
  render();
}

async function upsertInventoryItem(){

  } else {

async function adjustInventory(code,type,qty){

  if(qty<=0)return alert('Anh nhập số lượng hợp lệ.');
  if(type==='Xuất kho' && qty>Number(item.quantity||0))return alert('Số lượng xuất lớn hơn tồn kho.');
  if(!(await confirmInventoryTransition(type,item,qty)))return;
  item.quantity=Number(item.quantity||0)+(type==='Nhập kho'?qty:-qty);

  saveInventory();
  render();
  await saveInventoryItemRemote(item).catch(e=>{state.inventory.syncStatus='Chưa ghi được Supabase, đã lưu tạm trên máy.'; console.warn(e); render();});

  state.accounting.syncStatus=auto?'Đang kiểm tra dữ liệu kế toán trên Supabase...':'Đang đồng bộ kế toán...';
  if(!auto)render();
  try{
    const remote=await fetchAccountingFromSupabase();
    const hasRemote=remote.outgoingInvoices.length||remote.payments.length;
    if(auto&&hadLocal&&!hasRemote){
      await Promise.all([...(state.accounting.outgoingInvoices||[]).map(x=>saveOutgoingInvoiceRemote(x).catch(e=>console.warn(e))),...(state.accounting.payments||[]).map(x=>savePaymentRemote(x).catch(e=>console.warn(e)))]);
      state.accounting.syncStatus='Đã giữ phiên kế toán hiện tại và sao lưu lên Supabase.';
    }else{
      state.accounting.outgoingInvoices=mergeRemoteByUpdatedAt(remote.outgoingInvoices,state.accounting.outgoingInvoices);
      state.accounting.payments=mergeRemoteByUpdatedAt(remote.payments,state.accounting.payments);
      state.accounting.syncStatus=hasRemote?'Đã đồng bộ kế toán từ Supabase.':'Chưa có dữ liệu kế toán trên Supabase.';
    }
    saveAccounting();
    render();
  }catch(e){
    state.accounting.syncStatus='Chưa đồng bộ được kế toán. Bấm SQL trong tab Kế toán để cập nhật bảng Supabase.';
    console.warn('Accounting sync failed:',e);
    render();
  }
}

async function syncInventoryFromSupabase(options={}){
  if(inventoryImportLocked()){ state.inventory.syncStatus=state.inventory.syncStatus||'Đang import báo giá, tạm dừng đồng bộ kéo dữ liệu từ Supabase.'; return; }
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY)return;
  const auto=!!options.auto, hadLocal=(state.inventory.items||[]).length>0;
  state.inventory.syncStatus=auto?'Đang kiểm tra phiên kho gần nhất...':'Đang tải kho từ Supabase...';
  render();
  try{
    const remote=await fetchInventoryFromSupabase();
    state.inventory.deletedItems={...inventoryDeletedTombstones(),...(remote.deleted||{})};
    if(auto&&hadLocal&&!remote.items.length){
      state.inventory.syncStatus='Đang giữ phiên kho trên máy và sao lưu lại lên Supabase...';
      saveInventory();
      render();
      await Promise.all((state.inventory.items||[]).filter(item=>!isInventoryDeleted(item)).map(item=>saveInventoryItemRemote(item).catch(e=>console.warn(e))));
      state.inventory.syncStatus='Đã giữ phiên kho gần nhất; Supabase rỗng nên không ghi đè.';
      render();
      return;
    }
    if(remote.items.length||!hadLocal){
      state.inventory.items=mergeInventoryRemoteWithLocal(remote.items,state.inventory.items,state.inventory.deletedItems);
      state.inventory.movements=remote.movements;
      state.inventory.syncStatus=remote.items.length?'Đã khôi phục kho từ Supabase.':'Chưa có dữ liệu kho trên Supabase.';
      saveInventory();
    }else{
      state.inventory.syncStatus='Đang giữ phiên kho trên máy.';
    }
    render();
  }catch(e){ state.inventory.syncStatus=hadLocal?'Đang giữ phiên kho trên máy; chưa kết nối được Supabase.':'Chưa kết nối được Supabase. Nếu mới tạo project, cần tạo bảng inventory_items và inventory_movements trước.'; console.warn('Supabase inventory sync failed:', e); render(); }
}

function supabaseSchemaSql(){ return `create table if not exists inventory_items (
  id uuid primary key default gen_random_uuid(),
  code text not null,
  barcode_id text not null unique,
  name text,
  product_type text,
  unit text,
  quantity numeric default 0,

  id uuid primary key default gen_random_uuid(),
  type text not null,
  code text,
  barcode_id text,
  name text,
  qty numeric default 0,
  happened_at timestamptz default now(),
  created_at timestamptz default now()
);

create policy "public write app working state" on app_working_state for all using (true) with check (true);`; }

function isValidIsoDate(v){ return /^\d{4}-\d{2}-\d{2}$/.test(String(v||'')); }

function numberToVietnamese(input){ const n=Math.round(Number(input||0)); if(!n) return 'Không đồng'; const d=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'], u=['',' nghìn',' triệu',' tỷ']; function r3(v,full){ const h=Math.floor(v/100), t=Math.floor((v%100)/10), o=v%10, p=[]; if(h||full)p.push(d[h]+' trăm'); if(t>1){p.push(d[t]+' mươi'); if(o===1)p.push('mốt'); else if(o===5)p.push('lăm'); else if(o)p.push(d[o]);} else if(t===1){p.push('mười'); if(o===5)p.push('lăm'); else if(o)p.push(d[o]);} else if(o){ if(h||full)p.push('lẻ'); p.push(d[o]);} return p.join(' ');} const g=[]; let rest=n; while(rest>0){g.push(rest%1000); rest=Math.floor(rest/1000);} const words=[]; for(let i=g.length-1;i>=0;i--) if(g[i]) words.push(r3(g[i], i<g.length-1)+u[i]); return words.join(' ').replace(/\s+/g,' ').trim().replace(/^./,c=>c.toUpperCase())+' đồng'; }
function numberToEnglish(input){
  const n=Math.round(Number(input||0));
  if(!n) return 'Zero';
  const ones=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tens=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  const units=['','thousand','million','billion'];
  function r3(v){
    const h=Math.floor(v/100), rest=v%100, parts=[];
    if(h) parts.push(ones[h]+' hundred');
    if(rest>=20){parts.push(tens[Math.floor(rest/10)]+(rest%10?'-'+ones[rest%10]:''));}
    else if(rest) parts.push(ones[rest]);
    return parts.join(' ');
  }
  const groups=[]; let rest=n;
  while(rest>0){groups.push(rest%1000); rest=Math.floor(rest/1000);}
  const words=[];
  for(let i=groups.length-1;i>=0;i--) if(groups[i]) words.push(r3(groups[i])+(units[i]?' '+units[i]:''));
  return words.join(' ').replace(/^./,c=>c.toUpperCase());
}

function normalizePinValue(value){
  return String(value||'').normalize('NFKC').replace(/\s+/g,'').trim();
}
function pinDigitsOnly(value){
  return String(value||'').normalize('NFKC').replace(/\D/g,'').trim();
}
function pinAccepted(value){
  const raw=normalizePinValue(value), digits=pinDigitsOnly(value);
  const candidates=[];
  [state?.ui?.appPinCode, localStorage.getItem(PIN_CODE_KEY), PIN_DEFAULT_CODE].forEach(v=>{
    const n=normalizePinValue(v), d=pinDigitsOnly(v);
    if(n)candidates.push(n);
    if(d)candidates.push(d);
  });
  return [...new Set(candidates)].some(code=>code===raw||code===digits);
}
function appPinCode(){
  const remote=normalizePinValue(state?.ui?.appPinCode);
  const stored=normalizePinValue(localStorage.getItem(PIN_CODE_KEY));
  return remote || stored || PIN_DEFAULT_CODE;
}
function acceptedPinCodes(){
  const codes=[];
  [state?.ui?.appPinCode, localStorage.getItem(PIN_CODE_KEY), PIN_DEFAULT_CODE].forEach(v=>{
    const n=normalizePinValue(v), d=pinDigitsOnly(v);
    if(n)codes.push(n);
    if(d)codes.push(d);
  });
  return [...new Set(codes)];
}
function lockApp(){
  sessionStorage.removeItem(PIN_UNLOCK_SESSION_KEY);
  appUnlocked=false;
  appPinError='';
  render();
}
function unlockApp(pin){
  const entered=normalizePinValue(pin);
  if(!entered){appPinError='Anh nhập mã PIN.'; return false;}
  if(pinAccepted(entered)){
    localStorage.setItem(PIN_CODE_KEY,entered);
    state.ui.appPinCode=entered;
    sessionStorage.setItem(PIN_UNLOCK_SESSION_KEY,'1');
    appUnlocked=true;
    appPinError='';
    appLastActivity=Date.now();
    scheduleWorkingStateSave();
    render();
    return true;
  }
  appPinError='Sai mã PIN. Anh kiểm tra lại.';
  render();
  return false;
}

function bindPinGate(){
  const form=document.getElementById('pinForm'), input=document.getElementById('pinInput');
  let pinTryTimer=null;
  const clean=()=>{
    if(!input)return '';
    const normalized=normalizePinValue(input.value).slice(0,16);
    if(input.value!==normalized)input.value=normalized;
    return normalized;
  };
  const clearPinError=()=>{
    if(!appPinError)return;
    appPinError='';
    input?.classList.remove('border-coral','bg-coral/5');
    input?.classList.add('border-black/15','bg-[#F7F7F2]');
  };
  const tryUnlock=(force=false)=>{
    const value=clean();
    clearPinError();
    if(value&&pinAccepted(value))unlockApp(value);
    else if(force)unlockApp(value);
  };
  const delayedTry=(force=false)=>{
    clearTimeout(pinTryTimer);
    pinTryTimer=setTimeout(()=>tryUnlock(force),40);
  };
  if(input){
    setTimeout(()=>{input.focus({preventScroll:true}); input.select?.();},160);
    ['input','change','keyup','paste','compositionend','blur'].forEach(evt=>input.addEventListener(evt,e=>{
      if(e.type==='keyup'&&e.key==='Enter')delayedTry(true);
      else delayedTry(false);
    }));
  }
  if(form)form.onsubmit=e=>{e.preventDefault(); delayedTry(true);};
}

etProfit',true)}</div><label class="mt-5 grid gap-1.5"><span class="text-[11px] font-semibold uppercase tracking-wide text-white/55">Đưa giá sang dòng báo giá</span><select data-price-target class="h-10 min-w-0 rounded-md border border-white/15 bg-white px-2 text-xs font-bold text-ink outline-none">${state.lines.map(l=>`<option value="${esc(l.uid)}" ${l.uid===target?'selected':''}>${esc(l.code||l.name||'Dòng sản phẩm')}</option>`).join('')}</select></label><button data-apply-price type="button" class="mt-3 h-10 w-full rounded-md bg-gold px-2 text-xs font-extrabold leading-tight text-ink hover:bg-[#ffd76a]">Đưa giá sang báo giá</button></aside></section>`; }

ss="grid min-w-0 gap-1.5"><span class="text-[11px] font-semibold uppercase tracking-wide text-black/50">Chọn / paste ảnh</span><div class="grid gap-2 sm:grid-cols-2"><button data-paste-line-image="${line.uid}" type="button" class="flex h-10 items-center justify-center rounded-md bg-mint px-2 text-xs font-extrabold text-white hover:bg-[#1f7e67]">Dán ảnh</button><label class="flex h-10 cursor-pointer items-center justify-center rounded-md bg-ink px-2 text-xs font-extrabold text-white hover:bg-black"><input data-line-image="${line.uid}" type="file" accept="image/png,image/jpeg" class="sr-only"/>Chọn ảnh</label>${line.photoDataUrl?`<button data-clear-line-image="${line.uid}" type="button" class="flex h-9 items-center justify-center rounded-md border border-black/10 px-2 text-xs font-bold text-coral hover:border-coral hover:bg-coral hover:text-white sm:col-span-2">Bỏ ảnh</button>`:''}</div></div></div><div class="grid gap-3 md:grid-cols-[0.9fr_0.85fr_0.8fr_1fr]">${codeSelect('Loại đèn','productType',line,PRODUCT_TYPES)}${codeSelect('Kiểu hàng','stockMode',line,STOCK_MODES)}${leadTimeSelect(line)}${lineInput('Mã hàng (sửa được)','code',line)}</div><div class="mt-3 grid gap-3 md:grid-cols-[0.55fr_0.9fr_0.7fr_0.9fr]">${lineInput('SL','quantity',line,'number')}${lineInput('Đơn giá','price',line,'number')}${lineInput('ĐVT','unit',line)}${lineInput('Kích thước','dimension',line)}</div><div class="mt-3 rounded-md border border-black/10 bg-[#F7F7F2] p-3"><div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between"><h3 class="text-sm font-extrabold">Thuộc tính sản phẩm</h3></div><div class="mt-3 grid gap-3 md:grid-cols-[1.05fr_1.05fr_2fr_.65fr_.65fr]">${ATTRIBUTE_FIELDS.map(f=>renderAttributeField(line,f)).join('')}</div></div></div>`; }
function lineInput(label,key,line,type='text'){ const isPrice=key==='price', isCode=key==='code', inputType=isPrice?'text':type, value=isPrice?moneyPlain(line[key]):line[key], inputMode=isPrice?' inputmode="numeric"':'', placeholder=key==='dimension'?'Ghi kích thước':(isCode?'Có thể sửa mã theo ý muốn':''); return `<label class="grid gap-1.5"><span class="text-xs font-semibold uppercase tracking-wide text-black/50">${label}</span><input data-line-field="${key}" type="${inputType}"${inputMode} value="${esc(value)}" placeholder="${placeholder}" class="h-11 rounded-md border border-black/15 bg-white px-3 text-sm font-medium outline-none placeholder:text-black/30 focus:border-mint focus:ring-4 focus:ring-mint/10" /></label>`; }

t-coral hover:bg-coral hover:text-white">Xóa</button></div></td></tr>`).join('')}</tbody></table></div>`:`<div class="mt-4 rounded-md border border-dashed border-black/15 bg-[#F7F7F2] p-6 text-center text-sm font-semibold text-black/45">Chưa có lịch sử. Sau khi anh bấm Xuất Excel, app sẽ tự ghi vào đây.</div>`}</div></section>`; }
function inputInvoiceNav(){ const tabs=[['list','Danh sách hóa đơn'],['upload','Upload hóa đơn'],['review','Hóa đơn cần kiểm tra'],['rules','Quy tắc HĐ vào'],['export','Xuất HĐ đầu vào']]; return `<div class="flex flex-wrap gap-2">${tabs.map(([id,label])=>`<button data-input-invoice-view="${id}" type="button" class="h-9 rounded-md px-3 text-xs font-extrabold ${state.inputInvoices.view===id?'bg-ink text-white':'border border-black/10 bg-white text-ink hover:border-mint'}">${label}</button>`).join('')}</div>`; }
function inputInvoiceFilters(){ const f=state.inputInvoices.filters||{}, cats=[...new Set((state.inputInvoices.invoices||[]).map(x=>x.category).filter(Boolean))], statuses=['Hợp lệ','Cần kiểm tra','Lỗi trùng hóa đơn','Thiếu dữ liệu','OCR không chắc chắn']; return `<div class="grid gap-2 md:grid-cols-6">${[['period','Kỳ tháng','month'],['year','Năm','number'],['supplier','Nhà cung cấp','text']].map(([k,l,t])=>`<label class="grid gap-1"><span class="text-[10px] font-bold uppercase text-black/40">${l}</span><input data-input-invoice-filter="${k}" type="${t}" value="${esc(f[k]||'')}" class="h-9 rounded-md border border-black/15 px-2 text-xs font-bold"/></label>`).join('')}<label class="grid gap-1"><span class="text-[10px] font-bold uppercase text-black/40">Nhóm</span><select data-input-invoice-filter="category" class="h-9 rounded-md border border-black/15 px-2 text-xs font-bold"><option value="">Tất cả</option>${cats.map(c=>`<option ${f.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select></label><label class="grid gap-1"><span class="text-[10px] font-bold uppercase text-black/40">Trạng thái</span><select data-input-invoice-filter="status" class="h-9 rounded-md border border-black/15 px-2 text-xs font-bold"><option value="">Tất cả</option>${statuses.map(s=>`<option ${f.status===s?'selected':''}>${esc(s)}</option>`).join('')}</select></label><label class="grid gap-1"><span class="text-[10px] font-bold uppercase text-black/40">Kiểm tra</span><select data-input-invoice-filter="reviewed" class="h-9 rounded-md border border-black/15 px-2 text-xs font-bold"><option value="">Tất cả</option><option value="yes" ${f.reviewed==='yes'?'selected':''}>Đã kiểm tra</option><option value="no" ${f.reviewed==='no'?'selected':''}>Chưa kiểm tra</option></select></label></div>`; }
function inputInvoiceExtractionPanel(inv){ const method=inv.extraction_method||'MANUAL', isOcr=method==='OCR'; return `<div class="mt-3 rounded-md border ${isOcr?'border-gold/40 bg-gold/10':'border-black/10 bg-white'} p-2"><div class="flex flex-wrap items-center justify-between gap-2"><div><span class="text-[10px] font-bold uppercase text-black/40">Phương pháp đọc</span><div class="mt-0.5 text-sm font-extrabold">${esc(method)}${isOcr?` · OCR ${Math.round(Number(inv.ocr_confidence_score||0)*100)}%`:''}</div></div><div class="flex flex-wrap gap-2">${inv.raw_ocr_text?`<button data-input-invoice-ocr="${esc(inv.id)}" type="button" class="h-8 rounded-md border border-mint/30 px-2 text-xs font-extrabold text-mint">Xem text OCR</button>`:''}<button data-input-invoice-edit-row="${esc(inv.id)}" type="button" class="h-8 rounded-md border border-black/10 px-2 text-xs font-extrabold">Sửa dữ liệu</button><button data-input-invoice-review="${esc(inv.id)}" type="button" class="h-8 rounded-md border border-mint/30 px-2 text-xs font-extrabold text-mint">Đánh dấu đã kiểm tra</button></div></div>${isOcr?'<div class="mt-2 rounded-md border border-gold/40 bg-white/70 p-2 text-xs font-extrabold text-[#8a5a00]">Dữ liệu được đọc bằng OCR, vui lòng kiểm tra lại.</div>':''}</div>`; }

function inputInvoiceInventoryOptions(selected=''){
  const opts=(state.inventory.items||[]).filter(item=>!isInventoryDeleted(item)).slice(0,500);
  return `<option value="">Chưa liên kết kho</option>${opts.map(item=>`<option value="${esc(item.code||item.barcodeId||'')}" ${selected&&(selected===(item.code||item.barcodeId))?'selected':''}>${esc(item.code||item.barcodeId||'')} - ${esc(item.name||productTypeName(item.productType)||'')}</option>`).join('')}`;
}
function inputInvoiceItemsSummary(inv){
  if(!inputInvoiceNeedsItemImages(inv))return '<span class="text-xs font-bold text-black/30">--</span>';
  const items=(inv.items||[]).map((it,i)=>inputInvoiceFinalizeLineAmount(normalizeInputInvoiceItem(it,i),inv.vat_rate));
  if(!items.length)return '<span class="text-xs font-bold text-coral">Chưa tách dòng hàng</span>';
  const visibleItems=items.slice(0,20);
  const card=(it,i)=>{
    const img=inputInvoiceItemImageUrl(it), label=inputInvoiceItemLabel(it,i), code=it.linked_inventory_code||'', lineTotal=Number(it.total_amount||0)||Number(it.net_amount||0)+Number(it.vat_amount||0);
    return `<div class="flex w-full items-start gap-2 rounded-md border border-black/10 bg-white p-2 shadow-sm">
      <div class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded border border-black/10 bg-[#F7F7F2]">
        ${img?`<img src="${esc(img)}" class="h-full w-full object-contain"/>`:'<span class="text-[9px] font-bold text-black/30">Ảnh</span>'}
      </div>
      <div class="min-w-0 flex-1 leading-tight">
        <div class="break-words text-[11px] font-extrabold leading-snug">${i+1}. ${esc(label)}</div>
        ${code&&code!==label?`<div class="mt-0.5 break-words text-[10px] font-bold leading-snug text-mint">${esc(code)}</div>`:''}
        <div class="mt-1 break-words text-[10px] font-bold leading-snug text-black/55">SL ${esc(it.quantity||'--')} · VAT- ${money(it.net_amount||0)} · VAT+ ${money(lineTotal)}</div>
      </div>
    </div>`;
  };
  return `<div class="grid w-[360px] max-w-[360px] gap-2">
    ${visibleItems.map(card).join('')}
    ${items.length>20?`<div class="rounded-md border border-dashed border-black/15 bg-[#F7F7F2] p-2 text-center text-[10px] font-bold text-black/45">+${items.length-20} món khác</div>`:''}
  </div>`;
}

function inputInvoiceNeedsItemImages(inv){
  const normalized=String(inv?.category||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return normalized.includes('hang hoa nhap kho');
}
function inputInvoiceItemsEditor(inv,locked=false){
  if(!inputInvoiceNeedsItemImages(inv)){
    return `<div class="mt-3 rounded-lg border border-black/10 bg-white p-3 text-xs font-bold text-black/45">Nhóm này không phải <b>Hàng hóa nhập kho</b> nên không cần tách dòng món/ảnh. Chỉ hóa đơn hàng hóa nhập kho mới cần gắn ảnh và mã kho từng món.</div>`;
  }

async function saveInputInvoiceItemChange(inv){ inv.items=(inv.items||[]).map((it,i)=>inputInvoiceFinalizeLineAmount({...it,line_index:i+1},inv.vat_rate)); inv.raw_item_description=inv.items.map((x,i)=>`${i+1}. ${x.item_name||''} | SL ${x.quantity||''} | Trước VAT ${moneyPlain(x.net_amount||0)} | VAT ${moneyPlain(x.vat_amount||0)} | Sau VAT ${moneyPlain(x.total_amount||0)}`).filter(Boolean).join('\n')||inv.raw_item_description||''; inv.updated_at=new Date().toISOString(); validateInputInvoice(inv); saveInputInvoices(); await saveInputInvoiceRemote(inv).catch(e=>{state.inputInvoices.syncStatus='Đã sửa hóa đơn trên máy, chưa đồng bộ được Supabase.'; console.warn(e);}); await saveInputInvoiceItemsRemote(inv).catch(e=>{state.inputInvoices.syncStatus='Đã lưu chi tiết món trên máy. Nếu Supabase chưa nhận ảnh/ghi chú, bấm SQL tạo bảng để thêm cột mới.'; console.warn(e);}); }
function syncInputInvoiceItemFromInventory(it){ const stock=it.linked_inventory_code?findInventoryItem(it.linked_inventory_code):null; if(stock){ if(!it.product_note)it.product_note=[stock.code,stock.name||productTypeName(stock.productType)].filter(Boolean).join(' - '); if(!it.product_image_url)it.product_image_url=photoSourceValue(stock); } return it; }
async function uploadInputInvoiceItemImage(invoiceId,itemId,file){ const inv=state.inputInvoices.invoices.find(x=>x.id===invoiceId); if(!inv||inv.locked||!file)return; const item=(inv.items||[]).find(x=>String(x.id)===String(itemId)); if(!item)return; state.inputInvoices.syncStatus='Đang upload ảnh món trong hóa đơn lên Supabase Storage...'; render(); try{ const code=[inv.invoice_number||inv.id,item.product_note||item.item_name||itemId].join('-'); const uploaded=await storeInventoryFile(file,'input-invoice',code); item.product_image_url=uploaded?.publicUrl||uploaded?.viewUrl||uploaded?.downloadUrl||uploaded?.url||''; await saveInputInvoiceItemChange(inv); state.inputInvoices.syncStatus='Đã lưu ảnh sản phẩm cho dòng hóa đơn.'; }catch(e){ state.inputInvoices.syncStatus='Chưa upload được ảnh sản phẩm: '+(e.message||e); console.warn(e); } render(); }
async function attachInputInvoicePdf(invoiceId,file){
  const inv=state.inputInvoices.invoices.find(x=>String(x.id)===String(invoiceId));
  if(!inv||!file)return;
  if(!/pdf/i.test(file.type||'')&&!/\.pdf$/i.test(file.name||''))return alert('Anh chọn đúng file PDF hóa đơn.');
  state.inputInvoices.syncStatus='Đang upload PDF hóa đơn lên Supabase Storage...';
  render();
  try{
    const urlObj=await storeInventoryFile(file,'input-invoice',file.name||`${inv.invoice_number||inv.id}.pdf`);
    const fileUrl=urlObj?.publicUrl||urlObj?.viewUrl||urlObj?.downloadUrl||urlObj?.url||'';
    inv.source_pdf_url=fileUrl;
    inv.updated_at=new Date().toISOString();
    const fileRow={id:uid(),invoice_id:inv.id,file_name:file.name||`${inv.invoice_number||inv.id}.pdf`,file_type:file.type||'application/pdf',file_url:fileUrl,storage_path:urlObj?.storagePath||urlObj?.path||'',storage_bucket:urlObj?.bucket||'invoice',size:file.size||0,uploaded_at:new Date().toISOString()};
    state.inputInvoices.files.unshift(fileRow);
    saveInputInvoices();
    await saveInputInvoiceRemote(inv).catch(e=>{state.inputInvoices.syncStatus='Đã lưu PDF trên máy, chưa đồng bộ được hóa đơn lên Supabase.'; console.warn(e);});
    await saveInputInvoiceFileRemote(fileRow).catch(e=>console.warn(e));
    state.inputInvoices.syncStatus='Đã thêm PDF cho hóa đơn.';
  }catch(e){
    state.inputInvoices.syncStatus='Chưa upload được PDF hóa đơn: '+(e.message||e);
    console.warn(e);
  }
  render();
}
async function reparseInputInvoiceItemsFromXml(id){
  const inv=state.inputInvoices.invoices.find(x=>String(x.id)===String(id));
  if(!inv)return;
  const url=driveAssetUrl(inv.source_xml_url||inv.source_file_url||'');
  if(!url)return alert('Hóa đơn này chưa có link XML để tách lại. Anh upload lại file XML hóa đơn nhé.');
  if(!confirm('Tách lại từng dòng hàng từ XML? Ảnh/ghi chú cũ sẽ được giữ theo thứ tự dòng nếu có.'))return;
  state.inputInvoices.syncStatus='Đang tách lại từng món từ XML hóa đơn...';
  render();
  try{
    const oldItems=(inv.items||[]).map(normalizeInputInvoiceItem);
    const xml=await fetch(url).then(r=>{ if(!r.ok)throw new Error('Không tải được XML'); return r.text(); });
    const parsed=parseVietnamInvoiceXml(xml,{name:inv.source_file_name||'',url:inv.source_file_url||url,xmlUrl:inv.source_xml_url||url,pdfUrl:inv.source_pdf_url||''});
    const merged=parsed.items.map((it,i)=>normalizeInputInvoiceItem({...it,product_note:oldItems[i]?.product_note||'',product_image_url:oldItems[i]?.product_image_url||'',linked_inventory_code:oldItems[i]?.linked_inventory_code||''},i));
    Object.assign(inv,{...parsed,id:inv.id,source_file_name:inv.source_file_name,source_file_url:inv.source_file_url,source_xml_url:inv.source_xml_url,source_pdf_url:inv.source_pdf_url,period:inv.period,note:inv.note,reviewed_by_accountant:inv.reviewed_by_accountant,locked:inv.locked,items:merged,updated_at:new Date().toISOString()});
    await saveInputInvoiceItemChange(inv);
    state.inputInvoices.syncStatus=`Đã tách lại ${merged.length} dòng hàng từ XML.`;
  }catch(e){
    state.inputInvoices.syncStatus='Chưa tách lại được XML: '+(e.message||e);
    console.warn(e);
  }
  render();
}

{field('Mã CQT','tax_authority_code')}${field('Tên người bán','seller_name')}${field('MST người bán','seller_tax_code')}${field('Địa chỉ bán','seller_address')}${field('Tên người mua','buyer_name')}${field('MST người mua','buyer_tax_code')}${field('Địa chỉ mua','buyer_address')}${field('Thanh toán','payment_status')}${field('Tiền trước VAT','net_amount')}${field('Thuế suất','vat_rate')}${field('Tiền VAT','vat_amount')}${field('Tổng tiền','total_amount')}${field('Nhóm','category')}${field('Nội dung kế toán','accounting_description')}${field('TK Nợ','suggested_debit_account')}${field('TK VAT','suggested_vat_account')}${field('TK Có','suggested_credit_account')}</div><label class="mt-2 grid gap-1"><span class="text-[10px] font-bold uppercase text-black/40">Nội dung gốc / ghi chú lỗi</span><textarea data-input-invoice-edit="raw_item_description" ${dis} class="min-h-20 rounded-md border border-black/15 px-2 py-2 text-xs font-bold">${esc(inv.raw_item_description||'')}</textarea></label>${inputInvoiceItemsEditor(inv,locked)}<div class="mt-2 rounded-md border ${inputInvoiceStatusClass(inv.validation_status)} p-2 text-xs font-extrabold">${esc(inv.validation_status)}${inv.validation_notes?` - ${esc(inv.validation_notes)}`:''}</div></div>`; }
function inputInvoiceSourceButton(inv,type){
  const label=type==='pdf'?'PDF':'XML';
  const url=type==='pdf'?(inv.source_pdf_url||''):(inv.source_xml_url||inv.source_file_url||'');

}

function inventoryOutgoingSearchText(item){

  return [item?.code,item?.barcodeId,item?.name,quote,label,attrs._quoteLineCode,attrs._quotationBatchKey,attrs._quoteDate].filter(Boolean).join(' ');

function inventoryOutgoingFilterMatch(item,filterText){
  const q=invoiceNorm(filterText||'');

  if(hay.includes(q)||q.includes(hay))return true;
  const attrs=item?.attributes||{};
  for(const raw of [attrs._quotationFileName,item?.quotationFileName,inventoryTrackingFileLabel(item,{quotationFileName:attrs._quotationFileName||item?.quotationFileName||''}),item?.code,item?.barcodeId,attrs._quoteLineCode].filter(Boolean)){

function inventoryOutgoingMoveDate(m,item){

function inventoryItemsForOutgoing(filterText='',period=''){

  if(moveCodes.size){
    const moved=items.filter(item=>moveCodes.has(String(item.barcodeId||item.code||''))||moveCodes.has(String(item.code||'')));

  }

function inventoryItemsForOutgoingPicker(filterText='',period=''){

  });

function refreshOutgoingPaymentStatuses(){

async function attachPaymentProofFile(file){
  if(!file)return false;
  if(!String(file.type||'').startsWith('image/'))return alert('Chứng từ UNC cần là file ảnh PNG/JPG/WebP.');
  const oldStatus=document.getElementById('paymentProofStatus')?.textContent||'';
  const status=document.getElementById('paymentProofStatus');
  if(status)status.textContent='Đang upload ảnh chứng từ lên Supabase Storage...';
  try{
    const raw=await readImageFileRaw(file);
    const compressed=await compressImageDataUrl(raw,1600,0.82);
    state.ui.pendingPaymentProofDataUrl=compressed;
    const uploadFile=fileFromDataUrl(compressed,`${storageSafePart(file.name||'unc')}.jpg`)||file;
    const uploaded=await uploadFileToSupabaseStorage(uploadFile,'payment-proof',paymentProofStorageCode());
    const url=uploaded?.publicUrl||uploaded?.viewUrl||uploaded?.downloadUrl||uploaded?.url||'';
    state.ui.pendingPaymentProofUrl=url;
    state.ui.pendingPaymentProofName=file.name||'UNC';
    paymentProofUi(url,state.ui.pendingPaymentProofName);
    return true;
  }catch(e){
    if(status)status.textContent=oldStatus||'Chưa upload được ảnh chứng từ.';
    alert('Chưa upload được ảnh chứng từ: '+driveUploadErrorMessage(e));
    return false;
  }
}

async function pastePaymentProofFromClipboard(){
  try{
    if(!navigator.clipboard?.read)throw new Error('Trình duyệt chưa cho đọc clipboard.');
    const items=await navigator.clipboard.read();
    for(const item of items){
      const imageType=item.types.find(t=>String(t).startsWith('image/'));
      if(imageType){ const blob=await item.getType(imageType); return attachPaymentProofFile(new File([blob],'unc-clipboard.png',{type:imageType})); }

}

function paymentOcrPlain(text){return String(text||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function paymentOcrLines(text){return String(text||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);}
function parsePaymentOcrDate(text){
  const t=String(text||'');
  const m=t.match(/\b(\d{1,2})[\/\-.](\d{1,2})[\/\-.]((?:20)?\d{2})\b/)||t.match(/\b((?:20)\d{2})[\/\-.](\d{1,2})[\/\-.](\d{1,2})\b/);
  if(!m)return '';
  let y,mo,d;
  if(String(m[1]).length===4){y=Number(m[1]);mo=Number(m[2]);d=Number(m[3]);}else{d=Number(m[1]);mo=Number(m[2]);y=Number(m[3]); if(y<100)y+=2000;}
  if(!y||!mo||!d||mo>12||d>31)return '';
  return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parsePaymentOcrAmount(text){
  const lines=paymentOcrLines(text), candidates=[];
  const re=/[-+]?\s*(?:\d{1,3}(?:[.,\s]\d{3})+|\d{5,})(?:[.,]\d{1,2})?\s*(?:vnđ|vnd|đ|d)?/gi;
  lines.forEach((line,idx)=>{
    const plain=paymentOcrPlain(line);
    let m;
    while((m=re.exec(line))){
      const raw=m[0].replace(/\s+/g,'');
      const value=invoiceMoney(raw);
      if(!value||value<1000||value>10000000000)continue;
      let score=value;
      if(/so tien|số tiền|amount|tong tien|tổng tiền|gia tri|giá trị|thanh toan|thanh toán|vnd|vnđ|\bđ\b/.test(plain))score+=100000000000;
      if(/phi|phí/.test(plain))score-=50000000000;
      if(/stk|so tai khoan|số tài khoản|account|ma giao dich|mã giao dịch|transaction|ref|ft\d|gd\d/.test(plain))score-=90000000000;
      // tránh nhận nhầm năm/ngày/giờ hoặc mã giao dịch ngắn
      if(/\b20\d{2}\b/.test(raw)&&value<1000000)score-=90000000000;
      candidates.push({value,score,idx,line});
    }
  });
  if(!candidates.length)return 0;
  candidates.sort((a,b)=>b.score-a.score);
  return candidates[0].value;
}
function parsePaymentOcrLineAfter(text,labels){
  const lines=paymentOcrLines(text);
  for(let i=0;i<lines.length;i++){
    const plain=paymentOcrPlain(lines[i]);
    if(labels.some(lb=>plain.includes(lb))){
      let val=lines[i].replace(/^.*?:/,'').trim();
      labels.forEach(lb=>{val=val.replace(new RegExp(lb,'ig'),'').trim();});
      val=val.replace(/^[-–—:\s]+/,'').trim();
      if(val&&val.length>2&&!/^\d+$/.test(val))return val;
      if(lines[i+1]&&lines[i+1].trim().length>2)return lines[i+1].trim();
    }
  }
  return '';
}
function parsePaymentOcr(text){
  const plain=paymentOcrPlain(text), lines=paymentOcrLines(text);
  const bankNames=['Vietcombank','VCB','Techcombank','TCB','MB Bank','MBBank','ACB','BIDV','VietinBank','VPBank','TPBank','Sacombank','HDBank','OCB','VIB','MSB','SHB','SeABank','Agribank','Eximbank'];
  const foundBank=bankNames.find(b=>plain.includes(paymentOcrPlain(b)))||'';
  const type=/giay bao co|giấy báo có|nhan tien|nhận tiền|nguoi chuyen|người chuyển|credited|credit|bao co/.test(plain)?'Thu':(/uy nhiem chi|ủy nhiệm chi|chuyen tien|chuyển tiền|nguoi nhan|người nhận|debit|debited|rut tien|rút tiền|thanh toan thanh cong|thanh toán thành công/.test(plain)?'Chi':'');
  const content=parsePaymentOcrLineAfter(text,['noi dung','nội dung','dien giai','diễn giải','ly do','lý do','ghi chu','ghi chú','remark','description','message']);
  const counterparty=parsePaymentOcrLineAfter(text,['nguoi nhan','người nhận','ten nguoi nhan','tên người nhận','nguoi chuyen','người chuyển','ten nguoi chuyen','tên người chuyển','ben thu huong','bên thụ hưởng','beneficiary','receiver','sender']);
  const account=parsePaymentOcrLineAfter(text,['so tai khoan','số tài khoản','stk','account number','account no']);
  const date=parsePaymentOcrDate(text);
  const amount=parsePaymentOcrAmount(text);
  return {date,type,amount,bank:foundBank,counterparty,account,content,raw_text:String(text||'').slice(0,5000),lines};
}
function applyPaymentOcrResult(data){
  const dateEl=document.getElementById('paymentDate'), typeEl=document.getElementById('paymentType'), amountEl=document.getElementById('paymentAmount'), labelEl=document.getElementById('paymentLabel'), noteEl=document.getElementById('paymentNote');
  if(data.date&&dateEl)dateEl.value=data.date;
  if(data.type&&typeEl)typeEl.value=data.type;
  if(data.amount&&amountEl)amountEl.value=moneyPlain(data.amount);
  const labelParts=[data.counterparty,data.content].filter(Boolean);
  if(labelEl&&!labelEl.value.trim()&&labelParts.length)labelEl.value=labelParts.join(' - ');
  const noteParts=[];
  if(data.bank)noteParts.push(`Ngân hàng: ${data.bank}`);
  if(data.account)noteParts.push(`STK: ${data.account}`);
  if(data.counterparty)noteParts.push(`Đối tượng: ${data.counterparty}`);
  if(data.content)noteParts.push(`Nội dung CK: ${data.content}`);
  if(noteEl){
    const old=noteEl.value.trim();
    const add=noteParts.join(' | ');
    if(add)noteEl.value=old?`${old} | ${add}`:add;
  }
  paymentScanSetStatus(`Đã quét UNC${data.amount?' - số tiền '+money(data.amount):''}. Anh kiểm tra lại trước khi lưu.`, data.amount?'ok':'info');
}
function paymentProofScanSource(){
  return state.ui.pendingPaymentProofDataUrl||document.querySelector('#paymentProofPreview img')?.src||driveAssetUrl(document.getElementById('paymentProof')?.value||state.ui.pendingPaymentProofUrl||'');
}
async function scanPaymentProofFromImage(){
  const src=paymentProofScanSource();
  if(!src)return alert('Anh dán/chọn ảnh UNC trước rồi bấm Quét UNC.');
  paymentScanSetStatus('Đang tải bộ quét chữ OCR...');
  await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js',()=>window.Tesseract&&window.Tesseract.recognize);
  paymentScanSetStatus('Đang quét ảnh UNC, vui lòng chờ...');
  try{
    const result=await window.Tesseract.recognize(src,'vie+eng',{logger:m=>{ if(m?.status){ const pct=Number(m.progress||0); paymentScanSetStatus(`Đang quét UNC: ${m.status}${pct?` ${Math.round(pct*100)}%`:''}`); } }});
    const text=result?.data?.text||'';
    if(!text.trim())throw new Error('Không đọc được chữ trong ảnh.');
    const data=parsePaymentOcr(text);
    applyPaymentOcrResult(data);
    if(!data.amount&&!data.date)paymentScanSetStatus('Đã quét nhưng chưa nhận được số tiền/ngày rõ ràng. Anh nhập tay phần còn thiếu.', 'error');
    return data;
  }catch(e){
    paymentScanSetStatus('Chưa quét được UNC. Có thể ảnh mờ, chữ nhỏ hoặc trình duyệt chặn đọc ảnh. Anh thử dán/chọn ảnh gốc rõ hơn.', 'error');
    throw e;
  }
}

function daysBetweenDates(start,end){
  if(!start||!end)return null;
  const parse=(v)=>{
    const text=String(v||'').trim();
    if(!text)return null;
    const iso=text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(iso)return new Date(Number(iso[1]),Number(iso[2])-1,Number(iso[3]));
    const vn=text.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
    if(vn){ const y=vn[3].length===2?Number('20'+vn[3]):Number(vn[3]); return new Date(y,Number(vn[2])-1,Number(vn[1])); }
    const d=new Date(text);
    return Number.isNaN(d.getTime())?null:new Date(d.getFullYear(),d.getMonth(),d.getDate());
  };
  const a=parse(start), b=parse(end);
  if(!a||!b)return null;
  const diff=Math.round((b.getTime()-a.getTime())/86400000);
  return Math.max(0,diff);
}

function stockScanValue(v){ v=String(v||'').trim(); const m=v.match(/#stock=([^\s]+)/); return m?decodeURIComponent(m[1]):v; }
function openStockLookup(v){ const key=stockScanValue(v); if(!key)return; location.hash=`stock=${encodeURIComponent(key)}`; render(); }
let stockScannerStream=null, stockScannerTimer=null;
function stopStockScanner(){ if(stockScannerTimer)clearInterval(stockScannerTimer); stockScannerTimer=null; if(stockScannerStream)stockScannerStream.getTracks().forEach(t=>t.stop()); stockScannerStream=null; }
async function startStockScanner(){ const video=document.getElementById('stockScannerVideo'); if(!video)return; if(!navigator.mediaDevices?.getUserMedia)return alert('Trình duyệt này chưa cho mở camera. Anh dán mã QR/link vào ô tra cứu nhé.'); if(!('BarcodeDetector' in window))return alert('Trình duyệt này chưa hỗ trợ quét QR trực tiếp. Anh mở trên Chrome/điện thoại hoặc dán mã QR vào ô tra cứu.'); stopStockScanner(); try{ stockScannerStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); video.srcObject=stockScannerStream; video.classList.remove('hidden'); await video.play(); const detector=new BarcodeDetector({formats:['qr_code']}); stockScannerTimer=setInterval(async()=>{ try{ const codes=await detector.detect(video); const value=codes?.[0]?.rawValue; if(value){ stopStockScanner(); openStockLookup(value); } }catch(e){} },600); }catch(e){ alert('Chưa mở được camera. Anh kiểm tra quyền Camera của trình duyệt nhé.'); } }

||state.activeTab==='pricing'||state.activeTab==='history')?renderToolsTab():(state.activeTab==='stock'?renderInventoryTab():(state.activeTab==='accounting'||state.activeTab==='inputInvoices'?renderAccountingTab():quoteHtml)); root.innerHTML=`<main class="min-h-screen"><section class="border-b border-black/10 bg-white"><div class="mx-auto flex max-w-7xl items-center justify-center px-4 py-4 sm:px-6 lg:px-8"><img src="${UI_LOGO_DATA_URL}" alt="Minmin" class="h-12 w-auto object-contain"/></div></section>${tabNav()}${current}</main>`; bind(); if(!state.loading) scheduleSave(); }

async function importQuotationToInventory(file){
  await loadScript('https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js',()=>window.ExcelJS);
  const wb=new window.ExcelJS.Workbook();

    const imageMap=worksheetProductImages(wb,worksheetForProductImages(wb));
    lines.forEach((line,i)=>applyExcelPhotoFallback(line,imageMap.get(i)));
    state.info.quoteDate=(appData.info&&isValidIsoDate(appData.info.quoteDate))?appData.info.quoteDate:(inferQuoteDateFromLines(lines)||inferQuoteDateFromFileName(file.name)||quoteDateIso());
  }else{
    const sheet=wb.worksheets[0];
    if(!sheet)throw new Error('File Excel không có sheet báo giá.');
    const imageMap=worksheetProductImages(wb,sheet);
    for(let r=11;r<=sheet.rowCount;r++){
      const row=sheet.getRow(r), c=excelCellText(row.getCell(3)).trim(), d=excelCellText(row.getCell(4)).trim();
      if(c==='PVC'||d.includes('Fee ship')||d.includes('Phí vận chuyển'))break;
      if(c||d){
        const line=importLineFromExcel(row), image=productImageFromMap(imageMap,lines.length,r);

    const baseCode=String(line.code||'').trim()||nextInventoryCode(productType);
    const finalCode=uniqueInventoryCodeForImport(baseCode,reservedCodes);

    if(finalCode!==baseCode)renamedCount++;
    let photoDataUrl=photoSourceValue(line)||'';
    const attrs={...ATTRIBUTE_DEFAULTS,...(line.attributes||{})};
    attrs._quotationFileName=file.name||'';
    attrs._quotationBatchKey=batchKey;
    attrs._quotationImportKey=`${batchKey}|${lineIndex+1}|${baseCode}|${line.name||''}|${line.dimension||''}|${Date.now()}`;
    attrs._quoteLineCode=baseCode;

    attrs._inventoryCodeGenerated=finalCode;

    if(String(photoDataUrl||'').startsWith('data:image/')){
      photoDataUrl=await compressImageDataUrl(photoDataUrl);
      const imgFile=fileFromDataUrl(photoDataUrl,`${finalCode}.png`);
      if(imgFile){
        try{
          const uploaded=await uploadFileToSupabaseStorage(imgFile,'photo',finalCode);
          const photoMeta=applyUploadedPhotoMeta({attributes:attrs},uploaded);
          photoDataUrl=photoMeta.photoStorageUrl||photoMeta.photoDriveUrl||photoDataUrl;

      name:String(line.name||productTypeName(productType)).trim(),

      price:parseInputMoney(line.price||0),
      orderDate:importedQuoteDate,

      photoStorageUrl:line.photoStorageUrl||(!isEmbeddedFileValue(photoDataUrl)?photoDataUrl:''),

    });
    clearInventoryDeletedTombstone(item.code);
    clearInventoryDeletedTombstone(item.barcodeId);
    state.inventory.items=[item,...(Array.isArray(state.inventory.items)?state.inventory.items:[])];
    imported.push(item);
    movements.push(inventoryMovement('Đang sản xuất',item,Number(item.quantity||1)));
    count++;
  }
  state.activeTab='stock';
  state.ui.stockSearch='';
  state.inventory.importing=false;
  holdInventoryImportLock(15000);
  state.inventory.syncStatus=`Đã import ${count}/${lines.length} dòng báo giá vào Kho hàng. ${renamedCount?`Có ${renamedCount} mã trùng đã tự thêm hậu tố -02/-03 để không đè hàng cũ.`:'Không có mã bị đè.'}${missingPhotoCount?` Có ${missingPhotoCount} dòng chưa có ảnh.`:''}${storageErrorCount?` Có ${storageErrorCount} ảnh đang hiển thị tạm vì Storage chưa upload được.`:''}`;

  saveInventory();
  render();
  alert(`Đã import ${count}/${lines.length} dòng báo giá vào Kho hàng. Đang hiển thị ${visibleImported}/${count} sản phẩm vừa nhập ở tab Kho hàng.`);
}
